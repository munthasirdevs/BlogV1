<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Masterclass Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-gray-900">Masterclass Blog</span>
            </a>
            <h1 class="text-3xl font-bold mt-6">Create an account</h1>
            <p class="text-gray-600 mt-2">Start sharing your stories</p>
        </div>

        <!-- Register Form -->
        <div class="card p-8">
            <form id="register-form" class="space-y-6">
                <div>
                    <label for="name" class="label">Full name</label>
                    <input type="text" id="name" name="name" required 
                           class="input" placeholder="John Doe">
                </div>

                <div>
                    <label for="email" class="label">Email address</label>
                    <input type="email" id="email" name="email" required 
                           class="input" placeholder="you@example.com">
                </div>

                <div>
                    <label for="password" class="label">Password</label>
                    <input type="password" id="password" name="password" required minlength="8"
                           class="input" placeholder="••••••••">
                    <p class="text-xs text-gray-500 mt-1">Minimum 8 characters</p>
                </div>

                <div>
                    <label for="password_confirmation" class="label">Confirm password</label>
                    <input type="password" id="password_confirmation" name="password_confirmation" required 
                           class="input" placeholder="••••••••">
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary w-full btn-lg">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Already have an account? 
                    <a href="/pages/login.html" class="text-blue-600 font-medium">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        // Redirect if already logged in
        authService.requireGuest('/');

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirmation = document.getElementById('password_confirmation').value;

            if (password !== passwordConfirmation) {
                UI.toast('Passwords do not match', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner spinner-sm"></span> Creating account...';

            const result = await authService.register(name, email, password, passwordConfirmation);

            if (result.success) {
                UI.toast('Account created! Please login.', 'success');
                setTimeout(() => {
                    window.location.href = '/pages/login.html';
                }, 1000);
            } else {
                UI.toast(result.message || 'Registration failed', 'error');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
