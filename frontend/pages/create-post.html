<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - Masterclass Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-40 transition-colors">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-gray-900 dark:text-gray-100">Masterclass Blog</span>
                </a>
                <div class="flex items-center gap-4">
                    <!-- Dark Mode Toggle -->
                    <button data-theme-toggle onclick="UI.toggleDarkMode()" class="dark-mode-toggle p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" aria-label="Toggle dark mode">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                    <a href="/pages/blog-list.html" class="btn btn-secondary">Cancel</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Create New Post</h1>

        <form id="post-form" class="card p-6 space-y-6">
            <div>
                <label class="label">Title</label>
                <input type="text" id="title" class="input" placeholder="Enter post title" required>
            </div>

            <div>
                <label class="label">Category</label>
                <select id="category" class="input" required></select>
            </div>

            <div>
                <label class="label">Tags</label>
                <select id="tags" class="input" multiple></select>
                <p class="text-xs text-gray-500 mt-1">Hold Ctrl/Cmd to select multiple tags</p>
            </div>

            <div>
                <label class="label">Featured Image URL</label>
                <input type="url" id="featured_image" class="input" placeholder="https://example.com/image.jpg">
            </div>

            <div>
                <label class="label">Content</label>
                <textarea id="content" rows="15" class="input font-mono" placeholder="Write your content here..." required></textarea>
            </div>

            <div>
                <label class="label">Excerpt (optional)</label>
                <textarea id="excerpt" rows="3" class="input" placeholder="Brief summary..."></textarea>
            </div>

            <div class="flex items-center gap-4">
                <label class="label mb-0">Status:</label>
                <select id="status" class="input w-auto">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                </select>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="btn btn-primary btn-lg">Publish Post</button>
                <button type="button" onclick="saveDraft()" class="btn btn-secondary btn-lg">Save as Draft</button>
            </div>
        </form>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/blog.js"></script>
    <script src="../js/taxonomy.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        authService.requireAuth();

        async function loadCategories() {
            const result = await taxonomyService.getCategories();
            if (result.success) {
                document.getElementById('category').innerHTML = '<option value="">Select a category</option>' + 
                    result.data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            }
        }

        async function loadTags() {
            const result = await taxonomyService.getTags();
            if (result.success) {
                document.getElementById('tags').innerHTML = result.data.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            }
        }

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const tags = Array.from(document.getElementById('tags').selectedOptions).map(o => parseInt(o.value));

            const data = {
                title: document.getElementById('title').value,
                category_id: parseInt(document.getElementById('category').value),
                content: document.getElementById('content').value,
                excerpt: document.getElementById('excerpt').value || null,
                featured_image: document.getElementById('featured_image').value || null,
                tags: tags.length ? tags : null,
                status: document.getElementById('status').value,
            };

            const result = await blogService.createPost(data);

            if (result.success) {
                UI.toast('Post created successfully!', 'success');
                window.location.href = `/pages/blog-detail.html?slug=${result.data.slug}`;
            } else {
                UI.toast(result.message, 'error');
            }
        });

        async function saveDraft() {
            document.getElementById('status').value = 'draft';
            document.getElementById('post-form').dispatchEvent(new Event('submit'));
        }

        UI.initDarkMode();
        loadCategories();
        loadTags();
    </script>
</body>
</html>
