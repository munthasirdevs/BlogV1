<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles - Masterclass Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-40 transition-colors">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-gray-900 dark:text-gray-100">Masterclass Blog</span>
                </a>
                <div class="flex items-center gap-4">
                    <!-- Dark Mode Toggle -->
                    <button data-theme-toggle onclick="UI.toggleDarkMode()" class="dark-mode-toggle p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg" aria-label="Toggle dark mode">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                    <a href="/" class="nav-link">Home</a>
                    <a href="/pages/blog-list.html" class="nav-link nav-link-active">Articles</a>
                    <a href="/pages/create-post.html" class="btn btn-primary btn-sm" data-auth>Create Post</a>
                    <a href="/pages/login.html" class="btn btn-secondary btn-sm" data-guest>Login</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Main Content -->
            <div class="flex-1">
                <!-- Page Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold mb-2" id="page-title">All Articles</h1>
                    <p class="text-gray-600" id="page-description">Discover insights and tutorials from our community</p>
                </div>

                <!-- Filters -->
                <div class="flex flex-wrap gap-4 mb-6">
                    <select id="category-filter" onchange="applyFilters()" class="input w-auto">
                        <option value="">All Categories</option>
                    </select>
                    <select id="sort-filter" onchange="applyFilters()" class="input w-auto">
                        <option value="published_at">Latest</option>
                        <option value="views_count">Most Viewed</option>
                        <option value="title">Alphabetical</option>
                    </select>
                </div>

                <!-- Posts Grid -->
                <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Loading skeleton -->
                    <div class="card animate-pulse">
                        <div class="aspect-video bg-gray-200"></div>
                        <div class="p-5 space-y-3">
                            <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                            <div class="h-6 bg-gray-200 rounded w-3/4"></div>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="mt-8"></div>
            </div>

            <!-- Sidebar -->
            <aside class="lg:w-80 space-y-6">
                <!-- Search -->
                <div class="card p-4">
                    <form onsubmit="handleSearch(event)" class="flex gap-2">
                        <input type="text" id="search-input" placeholder="Search..." class="input flex-1">
                        <button type="submit" class="btn btn-primary">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                        </button>
                    </form>
                </div>

                <!-- Categories -->
                <div class="card p-4">
                    <h3 class="font-bold mb-4">Categories</h3>
                    <div id="sidebar-categories" class="space-y-2"></div>
                </div>

                <!-- Tags -->
                <div class="card p-4">
                    <h3 class="font-bold mb-4">Popular Tags</h3>
                    <div id="sidebar-tags" class="flex flex-wrap gap-2"></div>
                </div>
            </aside>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/blog.js"></script>
    <script src="../js/taxonomy.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        let currentPage = 1;
        let currentFilters = {};

        authService.init();

        async function loadPosts(page = 1) {
            const container = document.getElementById('posts-container');
            UI.showLoading(container);

            const params = { ...currentFilters, page, per_page: 6 };
            const result = await blogService.getPosts(params);

            if (result.success) {
                container.innerHTML = result.data.map(post => UI.createPostCard(post)).join('');
                
                document.getElementById('pagination').innerHTML = UI.createPagination(result.meta, loadPosts);
                currentPage = page;
            } else {
                container.innerHTML = '<p class="text-gray-500">Failed to load posts</p>';
            }
        }

        async function loadCategories() {
            const result = await taxonomyService.getCategories({ with_count: true });
            if (result.success) {
                const categories = result.data;
                
                document.getElementById('category-filter').innerHTML += 
                    categories.map(cat => `<option value="${cat.slug}">${cat.name} (${cat.posts_count})</option>`).join('');
                
                document.getElementById('sidebar-categories').innerHTML = 
                    categories.map(cat => `
                        <a href="#" onclick="filterByCategory('${cat.slug}')" class="block py-2 text-gray-600 hover:text-blue-600">
                            ${cat.name} <span class="text-gray-400 text-sm">(${cat.posts_count})</span>
                        </a>
                    `).join('');
            }
        }

        async function loadTags() {
            const result = await taxonomyService.getTags({ with_count: true });
            if (result.success) {
                document.getElementById('sidebar-tags').innerHTML = 
                    result.data.slice(0, 10).map(tag => `
                        <a href="#" onclick="filterByTag('${tag.slug}')" 
                           class="badge bg-gray-100 text-gray-700 hover:bg-blue-100 hover:text-blue-700">
                            ${tag.name}
                        </a>
                    `).join('');
            }
        }

        function applyFilters() {
            currentFilters = {};
            
            const category = document.getElementById('category-filter').value;
            const sort = document.getElementById('sort-filter').value;
            
            if (category) currentFilters.category = category;
            if (sort) currentFilters.sort = sort;
            
            loadPosts(1);
        }

        function filterByCategory(slug) {
            document.getElementById('category-filter').value = slug;
            applyFilters();
        }

        function filterByTag(slug) {
            currentFilters = { tag: slug };
            loadPosts(1);
        }

        function handleSearch(e) {
            e.preventDefault();
            const query = document.getElementById('search-input').value;
            if (query) {
                window.location.href = `/pages/search.html?q=${encodeURIComponent(query)}`;
            }
        }

        function loadPage(page) {
            loadPosts(page);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Check URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('category')) {
            currentFilters.category = urlParams.get('category');
            document.getElementById('category-filter').value = urlParams.get('category');
        }

        // Initialize
        UI.initDarkMode();
        loadPosts();
        loadCategories();
        loadTags();
    </script>
</body>
</html>
